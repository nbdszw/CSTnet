# Backbone
backbone: rsp_resnet18

transfer_loss: bnm

# Optimizer related
weight_decay: 5e-4
lr_scheduler: True
lr_gamma: 0.0003
lr_decay: 0.75
momentum: 0.9

src_domain: Source
tgt_domain: Target
num_samples: 100

# Training related
n_iter_per_epoch: 500
n_epoch: 100
num_workers: 10

# Semantic branch related (Chapter 4)
use_semantic_branch: False
semantic_path: ''
semantic_dim: 0
shared_dim: 128
semantic_hidden_dim: 0
semantic_conf_threshold: 0.95
semantic_metric: cosine
semantic_logit_scale: 8
semantic_normalize: True
semantic_loss_weight: 0.02
semantic_src_weight: 1.0
semantic_tgt_weight: 0.1

semantic_tgt_warmup_epochs: 20
semantic_margin_threshold: 0.1
semantic_decay_power: 1.5
semantic_tgt_ramp_power: 2.0
semantic_beta: 0.5
debug_semantic: False
